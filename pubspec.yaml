name: rost
description: "Приложения для учёта занятий логопедов, дефектологов"

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Управление состоянием
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.10

  # Локальное хранилище
  hive: ^2.2.3            
  hive_flutter: ^1.1.0

  # Внедрение зависимостей
  get_it: ^7.6.4

  # Уведомления
  flutter_local_notifications: ^16.3.2

  # Форматирование дат
  intl: ^0.18.1

  cupertino_icons: ^1.0.8


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Генерация кода для Hive
  hive_generator: ^2.0.1      
  build_runner: ^2.4.9        

flutter:
  uses-material-design: true